name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Compile tools
        run: python -m py_compile tools/check_skills.py tools/catalog_skills.py tools/cut_changelog.py

      - name: Run repository checks
        run: make check

      - name: Run pre-commit
        run: |
          python -m pip install --upgrade pre-commit
          pre-commit run --all-files
